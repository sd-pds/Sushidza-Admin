<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Переадресация...</title>
  <meta http-equiv="refresh" content="0; url=/" />
  <style>
    :root{
      color-scheme: dark;
      --bg:#070708;
      --card:rgba(255,255,255,.06);
      --line:rgba(255,255,255,.10);
      --text:#f3f3f4;
      --muted:rgba(243,243,244,.72);
      --accent:#ff6a3d;
      --accent2:#ffc15c;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      background:
        radial-gradient(circle at top, rgba(255,106,61,.18), transparent 34%),
        radial-gradient(circle at bottom, rgba(255,193,92,.10), transparent 30%),
        var(--bg);
      color:var(--text);
      font:16px/1.45 system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      padding:24px;
    }
    .card{
      width:min(520px,100%);
      padding:28px;
      border-radius:28px;
      border:1px solid var(--line);
      background:var(--card);
      backdrop-filter:blur(14px);
      text-align:center;
      box-shadow:0 18px 60px rgba(0,0,0,.35);
    }
    .title{
      margin:0 0 8px;
      font-size:32px;
      font-weight:900;
      letter-spacing:.04em;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
    }
    .text{margin:0;color:var(--muted)}
    .link{
      display:inline-flex;
      margin-top:18px;
      padding:12px 18px;
      border-radius:999px;
      text-decoration:none;
      color:#fff;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      font-weight:700;
    }
  </style>
  <script>
    window.location.replace("/");
  </script>
</head>
<body>
  <div class="card">
    <h1 class="title">Переадресация</h1>
    <p class="text">Страница не найдена. Сейчас откроем главную.</p>
    <a class="link" href="/">Перейти на главную</a>
  </div>
</body>
</html>
